<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lotteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E60012" />
      <stop offset="100%" stop-color="#970012" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Main Rounded Container with premium gradient -->
  <rect width="512" height="512" rx="110" fill="url(#lotteGrad)" />
  <!-- Stylized "L" with subtle drop shadow -->
  <path d="M180 130 V382 C180 390 190 395 200 395 H360" stroke="#FFFFFF" stroke-width="55" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#shadow)" />
  <!-- Yellow Lotte Mart Accent Dot -->
  <circle cx="360" cy="395" r="32" fill="#FFD400" filter="url(#shadow)" />
</svg>
